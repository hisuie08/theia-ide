name: Publish Theia IDE Docker Image
on:
  workflow_dispatch:
env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  
jobs:
  build:
    name: Build and push Theia IDE image to Github Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: browser.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/theia-ide:latest
            ghcr.io/${{ github.repository }}/theia-ide:${{ github.sha }}
          platforms: linux/arm64
